{% extends "base.html" %}
{% block content %}
<h1>Subjects</h1>

{% for subject in subjects %}
<div>
    <h2><a href="/subjects/{{ subject.id }}">{{ subject.name }}</a></h2>
    <p>Average: {{ subject.average }}</p>
    <p>Number of Exams: {{ subject.num_exams }}</p>
    <p>Points: {{ subject.points }}</p>
</div>
{% endfor %}
{% endblock content %}
