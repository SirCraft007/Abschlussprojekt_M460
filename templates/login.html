{% extends "base.html" %}
{% block title %}Anmeldung{% endblock title %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-person-circle text-primary" style="font-size: 3rem;"></i>
          <h2 class="fw-bold mt-3">Anmeldung</h2>
          <p class="text-muted">Melden Sie sich an, um fortzufahren</p>
        </div>

        {% if message %}
        <div class="alert alert-{{ 'danger' if error else 'info' }} alert-dismissible fade show" role="alert">
          <i class="bi bi-{{ 'exclamation-triangle-fill' if error else 'info-circle-fill' }} me-2"></i>
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">
              <i class="bi bi-person me-1"></i>Benutzername
            </label>
            <input type="text" class="form-control form-control-lg" id="username" name="username" required
              value="{% if username %}{{ username }}{% endif %}" placeholder="Benutzername eingeben">
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">
              <i class="bi bi-lock me-1"></i>Passwort
            </label>
            <input type="password" class="form-control form-control-lg" id="password" name="password" required
              value="{% if password %}{{ password }}{% endif %}" placeholder="Passwort eingeben">
          </div>

          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-box-arrow-in-right me-2"></i>Anmelden
            </button>
          </div>
        </form>

        <div class="text-center mt-4">
          <p class="text-muted mb-0">Noch kein Konto?</p>
          <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold">
            Jetzt registrieren <i class="bi bi-arrow-right"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
