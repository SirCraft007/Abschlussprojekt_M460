{% extends "base.html" %}
{% block title %}Passwort ändern{% endblock title %}
{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="fw-bold mb-4">
                    <i class="bi bi-key text-primary me-2"></i>Passwort ändern
                </h1>

                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-triangle me-2"></i>{{ message }}
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('update_password') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

                    <div class="mb-3">
                        <label for="old_password" class="form-label fw-bold">Aktuelles Passwort</label>
                        <input type="password" class="form-control" id="old_password" name="old_password"
                            placeholder="Aktuelles Passwort" required autocomplete="current-password">
                    </div>

                    <div class="mb-4">
                        <label for="new_password" class="form-label fw-bold">Neues Passwort</label>
                        <input type="password" class="form-control" id="new_password" name="new_password"
                            placeholder="Neues Passwort" required autocomplete="new-password">
                        <div class="form-text">
                            <i class="bi bi-info-circle me-1"></i>Wählen Sie ein sicheres Passwort.
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                        <a href="{{ url_for('user') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>Zurück
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-2"></i>Passwort ändern
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
