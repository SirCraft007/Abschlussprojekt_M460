<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Notenübersicht{% endblock title %}</title>
    <link rel="stylesheet" href="https://unpkg.com/simpledotcss/simple.min.css">
    {% block head %} {% endblock head %}
</head>

<body>
    <header>
        <nav>
            <a href="{{ url_for('index') }}">Startseite</a>
            {% if session.get('access_token') %}
            <a href="{{ url_for('subjects') }}">Fächer</a>
            <a href="{{ url_for('logout') }}">Abmelden</a>
            {% else %}
            <a href="{{ url_for('login') }}">Anmelden</a>
            <a href="{{ url_for('register') }}">Registrieren</a>
            {% endif %}
        </nav>
        <hr>
    </header>
    {% block content %} {% endblock content %}
</body>

</html>
